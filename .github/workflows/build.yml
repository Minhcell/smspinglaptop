name: Build EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore SmsPing.csproj

      - name: Build Release
        run: dotnet build SmsPing.csproj -c Release

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: SmsPing-exe
          path: bin/Release/net48/**
